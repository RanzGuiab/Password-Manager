services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password_placeholder # DevSecOps: We will move this to a secret later
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
