services:
  # The "Brain" (API)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pm-backend
    ports:
      - "8080:8080"
    env_file:
    - .env
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 512M # Keeping it lean for 8GB RAM

  # The "Face" (UI)
  frontend:
    build: 
      context: ./frontend/password_manager
      dockerfile: ../Dockerfile
    container_name: pm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  # The "Vault" (Database)
  db:
    image: postgres:15-alpine
    container_name: pm-db
    env_file: 
     - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
volumes:
  db_data: